name: Deploy Backend to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Gateway
        run: dotnet publish Gateway/Gateway.csproj -c Release -o publish/gateway
      - name: Deploy Gateway
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME_GATEWAY }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_GATEWAY }}
          package: publish/gateway

  deploy-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Auth.Api
        run: dotnet publish Auth.Api/Auth.Api.csproj -c Release -o publish/auth
      - name: Deploy Auth.Api
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME_AUTH }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_AUTH }}
          package: publish/auth

  deploy-swearjar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish SwearJar.Api
        run: dotnet publish SwearJar.Api/SwearJar.Api.csproj -c Release -o publish/swearjar
      - name: Deploy SwearJar.Api
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME_SWEARJAR }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_SWEARJAR }}
          package: publish/swearjar