services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: swear-jar-azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite-data:/data
    restart: unless-stopped

volumes:
  azurite-data: